<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ironman 70.3 | Elite Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root { --bpn-red: #ff0000; --bpn-black: #0e0e0e; --bpn-grey: #1a1a1a; --bpn-light-grey: #2d2d2d; --text: #ffffff; --muted: #888888; }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bpn-black); color: var(--text); font-family: 'Inter', sans-serif; padding: 20px; max-width: 500px; margin: 0 auto; }
  header { text-align: left; margin-bottom: 15px; border-left: 4px solid var(--bpn-red); padding-left: 15px; }
  h1 { font-family: 'Bebas Neue', sans-serif; font-size: 64px; line-height: 0.85; text-transform: uppercase; font-weight: 900; }
  #countdown { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--bpn-red); text-transform: uppercase; font-weight: 700; margin-top: 5px; display: block; }
  
  .weekly-stats { display: flex; gap: 10px; margin-bottom: 15px; }
  .stat-box { flex: 1; background: var(--bpn-grey); border-radius: 4px; padding: 10px; text-align: center; border: 1px solid var(--bpn-light-grey); border-top: 2px solid var(--bpn-red); }
  .stat-label { font-family: 'JetBrains Mono'; font-size: 9px; color: var(--muted); display: block; text-transform: uppercase; }
  .stat-val { font-family: 'Bebas Neue'; font-size: 20px; color: #fff; margin-top: 4px; display: block; }

  .weekly-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; margin-bottom: 15px; scroll-snap-type: x mandatory; }
  .weekly-day-card { min-width: 85px; background: var(--bpn-grey); padding: 10px; border-radius: 4px; text-align: center; border: 1px solid var(--bpn-light-grey); scroll-snap-align: start; cursor: pointer;}
  .weekly-day-card.active { border-color: var(--bpn-red); background: #251010; border-width: 2px; }
  .wd-name { font-family: 'JetBrains Mono'; font-size: 9px; color: var(--muted); display: block; }
  .wd-work { font-family: 'Bebas Neue'; font-size: 16px; color: #fff; display: block; margin-top: 4px; }
  
  .card { background: var(--bpn-grey); border-radius: 2px; padding: 20px; margin-bottom: 12px; border-top: 1px solid var(--bpn-light-grey); border-left: 4px solid var(--bpn-red); }
  .tag { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--bpn-red); text-transform: uppercase; font-weight: 800; margin-bottom: 8px; display: block; }
  .card-title { font-family: 'Bebas Neue', sans-serif; font-size: 34px; color: #fff; line-height: 1; margin-bottom: 8px; letter-spacing: 1px; }
  .check-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #2d2d2d; }
  .check-row b { color: var(--bpn-red); font-family: 'JetBrains Mono'; margin-right: 8px; }
  
  .fuel-box { background: rgba(255,0,0,0.05); border: 1px solid var(--bpn-red); padding: 12px; border-radius: 4px; margin: 10px 0; font-family: 'JetBrains Mono'; font-size: 11px; display: flex; justify-content: space-between; align-items: center;}
  .fuel-box span { color: #fff; }
  .fuel-box b { color: var(--bpn-red); font-size: 12px; }

  .interval-box { background: #000; padding: 12px; margin: 10px 0; border-radius: 4px; border: 1px solid var(--bpn-light-grey); }
  .interval-row { display: flex; justify-content: space-between; font-family: 'JetBrains Mono'; font-size: 12px; margin-bottom: 5px; }
  .interval-row b { color: var(--bpn-red); }
  .coach-note { font-size: 12px; color: #aaa; line-height: 1.5; font-style: italic; margin-top: 10px; padding-top: 10px; border-top: 1px solid #333; }
  
  .gym-list { list-style: none; margin-top: 10px; }
  .gym-list li { font-size: 13px; color: #ddd; margin-bottom: 8px; padding-left: 10px; border-left: 1px solid var(--bpn-red); }
  .gym-list li.armor { border-left-color: #555; color: #aaa; font-style: italic; }
  
  input[type="checkbox"] { accent-color: var(--bpn-red); width: 18px; height: 18px; }
  .calc-input { background: #1a1a1a; color: #fff; border: 1px solid var(--bpn-light-grey); padding: 8px; width: 100%; margin: 5px 0 15px 0; font-family: 'JetBrains Mono'; }
</style>
</head>
<body>
  <header><h1>ELITE<br>COMMAND</h1><span id="countdown">-- DAYS TO RACE</span></header>
  
  <div class="weekly-stats">
    <div class="stat-box"><span class="stat-label">Swim Vol</span><span class="stat-val" id="w-swim">--</span></div>
    <div class="stat-box"><span class="stat-label">Bike Dist</span><span class="stat-val" id="w-bike">--</span></div>
    <div class="stat-box"><span class="stat-label">Run Dist</span><span class="stat-val" id="w-run">--</span></div>
  </div>

  <div id="weekly-overview" class="weekly-scroll"></div>

  <div id="main-panel">
    <div class="card" style="border-left-color: #fff; background: #111;">
      <span class="tag" style="color: #fff;">05:00 - 07:30 // Morning Mission</span>
      <div class="check-row"><span><b>05:00</b> Wake Up & Salt Water</span><input type="checkbox"></div>
      <div class="check-row"><span><b>05:10</b> Scripture Study (20m)</span><input type="checkbox"></div>
      <div class="check-row"><span><b>05:45</b> Execute Cardio Session</span><input type="checkbox"></div>
      <div class="check-row" style="border:none"><span><b>07:30</b> Ready for Work</span><input type="checkbox"></div>
    </div>
    
    <div class="card">
      <span class="tag">Cardio Prescr.</span>
      <div class="card-title" id="c-title">--</div>
      <div class="fuel-box" id="c-fuel">--</div>
      <div class="interval-box" id="c-intervals"></div>
      <div id="c-cue" style="font-size: 11px; font-weight: 700; color: #fff;"></div>
      <div id="c-note" class="coach-note"></div>
    </div>
    
    <div class="card" style="border-left-color: #fff;">
      <span class="tag" style="color:#fff;">Muscle Maintenance & Armor</span>
      <div class="card-title" id="s-title">--</div>
      <div class="fuel-box" id="s-fuel" style="border-color: #fff; background: rgba(255,255,255,0.05);">--</div>
      <ul id="s-list" class="gym-list"></ul>
    </div>
  </div>

  <script>
    const CONFIG = { scaling: 1.10, base: { run: 2.0, bike: 12.0, swim: 400 } };
    let selectedIdx = new Date().getDay() === 0 ? 6 : new Date().getDay() - 1;

    // Endurance Cardio Fuel
    function calculateCardioFuelParams(t, i) {
      const total = (t/60) * (i > 7 ? 90 : 60);
      return `<span>Intra-Workout Fuel</span><b>${Math.round(total*0.6)}g Malto / ${Math.round(total*0.4)}g Fruct</b>`;
    }

    // Strength Training Fuel
    function calculateStrengthFuelParams() {
      // Baseline placeholder for strength sessions
      return `<span>Strength Stack</span><b style="color:#fff;">5g Creatine / 800mg Electrolytes</b>`;
    }

    function getPlan(wk) {
      const isDeload = [4,8,12,16].includes(wk);
      const scale = isDeload ? Math.pow(CONFIG.scaling, wk-1)*0.75 : Math.pow(CONFIG.scaling, wk-1);
      
      const sV = Math.round((CONFIG.base.swim * scale)/50)*50;
      const runMi = (2 * scale).toFixed(1);
      const bikeMi = (12 * scale).toFixed(1);
      
      const weeklyTotals = {
        swim: `${sV * 2} YD`,
        bike: `${(parseFloat(bikeMi) + 16).toFixed(1)} MI`,
        run: `${(parseFloat(runMi) + 3.1).toFixed(1)} MI`
      };

      return { 
        totals: weeklyTotals,
        days: [
        { name: "MON", ct: "Swim: Lat Focus", ci: [{l: "Volume", v: `${sV}yd`}, {l: "Set", v: `${Math.round(sV/100)}x100yd`}], cue: "Early Arm Catch", note: "Keep lats engaged. Muscle focus: Upper back and serratus.", st: "Lower Body Pull (Heavy)", fuel: calculateCardioFuelParams(45, 6), sFuel: calculateStrengthFuelParams(), sl: ["Deadlift: 3x5 (Heavy)", "RDL: 3x10 (Stretch focus)", "Leg Curls: 3x12", "Face Pulls: 3x15", "Calf Raises: 4x15", "<span class='armor'>[Armor] Pogo Jumps: 3x30s</span>", "<span class='armor'>[Armor] Soleus Raises: 4x15</span>"] },
        { name: "TUE", ct: "Run: Zone 2", ci: [{l: "Dist", v: `${runMi}mi`}, {l: "Pace", v: "13:00/mi"}], cue: "Nasal Only", note: "Base building. Don't let your HR spike.", st: "Full Body & Engine", fuel: calculateCardioFuelParams(45, 5), sFuel: calculateStrengthFuelParams(), sl: ["Power Clean: 3x3", "DB Bench: 3x10", "Bulgarian Split Squat: 3x8/leg", "Plank: 3x60s", "Deadbugs: 3x20", "<span class='armor'>[Armor] Tibialis Raises: 3x20</span>", "<span class='armor'>[Armor] Copenhagen Plank: 3x30s</span>"] },
        { name: "WED", ct: "Bike: Zone 2", ci: [{l: "Dur", v: "60m"}, {l: "Cadence", v: "90 RPM"}], cue: "Quiet Upper Body", note: "Endurance focus. Keep the legs moving consistently.", st: "Upper Body Push (Hypertrophy)", fuel: calculateCardioFuelParams(60, 5), sFuel: calculateStrengthFuelParams(), sl: ["Bench Press: 3x5", "Incline DB: 3x10", "Lateral Raises: 3x15", "Dips: 3xMax", "Skull Crushers: 3x12", "<span class='armor'>[Armor] Neck Extensions: 3x20</span>", "<span class='armor'>[Armor] Pogo Jumps: 3x30s</span>"] },
        { name: "THU", ct: "Swim: Efficiency", ci: [{l: "Volume", v: `${sV}yd`}, {l: "Sets", v: `${Math.round(sV/50)}x50yd`}], cue: "Streamline Focus", note: "Drill-heavy. Efficiency over speed today.", st: "Lower Body Push (Strength)", fuel: calculateCardioFuelParams(45, 5), sFuel: calculateStrengthFuelParams(), sl: ["Back Squat: 3x5", "Leg Press: 3x12", "Walking Lunges: 3x10/side", "Tib Raises: 3x20", "Pogo Jumps: 3x30s", "<span class='armor'>[Armor] Soleus Raises: 4x15</span>", "<span class='armor'>[Armor] Tibialis Raises: 3x20</span>"] },
        { name: "FRI", ct: "Run: 5K Tempo", ci: [{l: "Dist", v: "3.1mi"}, {l: "Target", v: "Race Intensity"}], cue: "Short Ground Contact", note: "Simulating the back half of the 70.3.", st: "Upper Body Pull (Strength)", fuel: calculateCardioFuelParams(30, 8), sFuel: calculateStrengthFuelParams(), sl: ["Weighted Pull-ups: 3xMax", "Pendlay Rows: 3x8", "Chest Supported Row: 3x12", "Bicep Curls: 3x12", "Reverse Flyes: 3x15", "<span class='armor'>[Armor] Clamshells: 3x20</span>", "<span class='armor'>[Armor] Pogo Jumps: 3x30s</span>"] },
        { name: "SAT", ct: "Long Bike + Brick", ci: [{l: "Bike", v: `${bikeMi}mi`}, {l: "Walk", v: "15m Brick"}], cue: "Fuel Every 45m", note: "Practice your race-day digestion system.", st: "Functional Stabil.", fuel: calculateCardioFuelParams(120, 6), sFuel: calculateStrengthFuelParams(), sl: ["Single Leg RDL: 3x12", "Clamshells: 3x20", "Bird-Dog: 3x15", "Hanging Leg Raises: 3x12", "Copenhagen Plank: 3x30s", "<span class='armor'>[Armor] Tibialis Raises: 3x20</span>", "<span class='armor'>[Armor] Soleus Raises: 4x15</span>"] },
        { name: "SUN", ct: "Active Reset", ci: [{l: "Type", v: "Walk"}, {l: "Time", v: "30m"}], cue: "Relax Shoulders", note: "System reset. Zero intensity. Family time.", st: "Full Mobility", fuel: `<span>Recovery Hydration</span><b>Water & Electrolytes Only</b>`, sFuel: `<span>Hydration Focus</span><b style="color:#fff;">Water & Electrolytes Only</b>`, sl: ["Couch Stretch: 3m/leg", "Pigeon Pose: 3m/leg", "Thoracic Rotation: 20/side", "Ankle Circles: 1m", "Foam Roll: 15m", "<span class='armor'>[Armor] Light Pogo Jumps: 3x20s</span>", "<span class='armor'>[Armor] Tibialis Raises: 2x20</span>"] }
      ]};
    }

    function updateView(idx) {
      selectedIdx = idx;
      const wk = parseInt(document.getElementById("wk-sel")?.value || 1);
      const plan = getPlan(wk);
      const day = plan.days[idx];
      
      // Update Headers
      document.getElementById("w-swim").innerText = plan.totals.swim;
      document.getElementById("w-bike").innerText = plan.totals.bike;
      document.getElementById("w-run").innerText = plan.totals.run;

      // Update Daily Data
      document.getElementById("c-title").innerText = day.ct;
      document.getElementById("c-cue").innerText = `Cue: ${day.cue}`;
      document.getElementById("c-note").innerText = `Coach: ${day.note}`;
      document.getElementById("c-fuel").innerHTML = day.fuel;
      document.getElementById("c-intervals").innerHTML = day.ci.map(i => `<div class="interval-row"><span>${i.l}</span><b>${i.v}</b></div>`).join('');
      
      document.getElementById("s-title").innerText = day.st;
      document.getElementById("s-fuel").innerHTML = day.sFuel;
      document.getElementById("s-list").innerHTML = day.sl.map(s => `<li>${s}</li>`).join('');
      
      initScroll(wk);
    }

    function initScroll(wk) {
      document.getElementById("weekly-overview").innerHTML = getPlan(wk).days.map((d, i) => `<div class="weekly-day-card ${i===selectedIdx?'active':''}" onclick="updateView(${i})"><span class="wd-name">${d.name}</span><span class="wd-work">${d.ct.split(':')[0]}</span></div>`).join('');
    }

    function init() {
      const race = new Date("September 13, 2026").getTime();
      document.getElementById("countdown").innerText = Math.max(0, Math.floor((race - new Date().getTime()) / (1000*60*60*24))) + " DAYS TO RACE";
      
      const startDate = new Date("March 30, 2026").getTime();
      const today = new Date().getTime();
      let calculatedWeek = 1;
      
      if (today > startDate) {
        const daysPassed = Math.floor((today - startDate) / (1000*60*60*24));
        calculatedWeek = Math.floor(daysPassed / 7) + 1;
      }
      calculatedWeek = Math.min(Math.max(calculatedWeek, 1), 20);

      const sel = document.createElement('select'); 
      sel.id = "wk-sel"; 
      sel.onchange = () => updateView(selectedIdx);
      sel.className = "calc-input"; 
      sel.style.marginTop = "10px";
      
      for(let i=1; i<=20; i++) { 
        let o = document.createElement('option'); 
        o.value = i; 
        o.text = `WEEK ${i}`; 
        if(i === calculatedWeek) { o.selected = true; } 
        sel.appendChild(o); 
      }
      
      document.querySelector('header').appendChild(sel);
      updateView(selectedIdx); 
    }
    
    init();
  </script>
</body>
</html>
