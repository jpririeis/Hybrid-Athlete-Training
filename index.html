<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ironman 70.3 | Elite Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root { --bpn-red: #ff0000; --bpn-black: #0e0e0e; --bpn-grey: #1a1a1a; --bpn-light-grey: #2d2d2d; --text: #ffffff; --muted: #888888; }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bpn-black); color: var(--text); font-family: 'Inter', sans-serif; padding: 20px; max-width: 500px; margin: 0 auto; }
  header { text-align: left; margin-bottom: 15px; border-left: 4px solid var(--bpn-red); padding-left: 15px; }
  h1 { font-family: 'Bebas Neue', sans-serif; font-size: 64px; line-height: 0.85; text-transform: uppercase; font-weight: 900; }
  #countdown { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--bpn-red); text-transform: uppercase; font-weight: 700; margin-top: 5px; display: block; }
  
  .phase-banner { background: var(--bpn-red); color: #fff; font-family: 'JetBrains Mono'; font-size: 11px; font-weight: 800; display: inline-block; padding: 4px 8px; margin-top: 10px; border-radius: 2px; letter-spacing: 0.5px;}

  .weekly-stats { display: flex; gap: 10px; margin-bottom: 15px; margin-top: 15px;}
  .stat-box { flex: 1; background: var(--bpn-grey); border-radius: 4px; padding: 10px; text-align: center; border: 1px solid var(--bpn-light-grey); border-top: 2px solid var(--bpn-red); }
  .stat-label { font-family: 'JetBrains Mono'; font-size: 9px; color: var(--muted); display: block; text-transform: uppercase; }
  .stat-val { font-family: 'Bebas Neue'; font-size: 20px; color: #fff; margin-top: 4px; display: block; }

  .weekly-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; margin-bottom: 15px; scroll-snap-type: x mandatory; }
  .weekly-day-card { min-width: 85px; background: var(--bpn-grey); padding: 10px; border-radius: 4px; text-align: center; border: 1px solid var(--bpn-light-grey); scroll-snap-align: start; cursor: pointer;}
  .weekly-day-card.active { border-color: var(--bpn-red); background: #251010; border-width: 2px; }
  .wd-name { font-family: 'JetBrains Mono'; font-size: 9px; color: var(--muted); display: block; }
  .wd-work { font-family: 'Bebas Neue'; font-size: 16px; color: #fff; display: block; margin-top: 4px; }
  
  .card { background: var(--bpn-grey); border-radius: 2px; padding: 20px; margin-bottom: 12px; border-top: 1px solid var(--bpn-light-grey); border-left: 4px solid var(--bpn-red); }
  .tag { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--bpn-red); text-transform: uppercase; font-weight: 800; margin-bottom: 8px; display: block; }
  .card-title { font-family: 'Bebas Neue', sans-serif; font-size: 34px; color: #fff; line-height: 1; margin-bottom: 8px; letter-spacing: 1px; }
  .check-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #2d2d2d; }
  .check-row b { color: var(--bpn-red); font-family: 'JetBrains Mono'; margin-right: 8px; }
  
  .fuel-box { background: rgba(255,0,0,0.05); border: 1px solid var(--bpn-red); padding: 12px; border-radius: 4px; margin: 10px 0; font-family: 'JetBrains Mono'; font-size: 11px; display: flex; justify-content: space-between; align-items: flex-start;}
  
  .interval-box { background: #000; padding: 12px; margin: 10px 0; border-radius: 4px; border: 1px solid var(--bpn-light-grey); }
  .interval-row { display: flex; justify-content: space-between; font-family: 'JetBrains Mono'; font-size: 12px; margin-bottom: 5px; }
  .interval-row b { color: var(--bpn-red); }
  .coach-note { font-size: 12px; color: #aaa; line-height: 1.5; font-style: italic; margin-top: 10px; padding-top: 10px; border-top: 1px solid #333; }
  
  .gym-list { list-style: none; margin-top: 10px; }
  .gym-list li { font-size: 13px; color: #ddd; margin-bottom: 8px; padding-left: 10px; border-left: 1px solid var(--bpn-red); }
  .gym-list li.armor { border-left-color: #555; color: #aaa; font-style: italic; }
  
  input[type="checkbox"] { accent-color: var(--bpn-red); width: 18px; height: 18px; }
  .calc-input { background: #1a1a1a; color: #fff; border: 1px solid var(--bpn-light-grey); padding: 8px; width: 100%; margin: 5px 0 5px 0; font-family: 'JetBrains Mono'; }
</style>
</head>
<body>
  <header>
    <h1>ELITE<br>COMMAND</h1>
    <span id="countdown">-- DAYS TO RACE</span>
    <div id="phase-tag" class="phase-banner">PHASE --</div>
  </header>
  
  <div class="weekly-stats">
    <div class="stat-box"><span class="stat-label">Phase Vol</span><span class="stat-val" id="w-swim">--</span></div>
    <div class="stat-box"><span class="stat-label">Intensity</span><span class="stat-val" id="w-bike">--</span></div>
    <div class="stat-box"><span class="stat-label">Deload Status</span><span class="stat-val" id="w-run">--</span></div>
  </div>

  <div id="weekly-overview" class="weekly-scroll"></div>

  <div id="main-panel">
    <div class="card" style="border-left-color: #fff; background: #111;">
      <span class="tag" style="color: #fff;">05:00 - 06:30 // Morning Engine</span>
      <div class="check-row"><span><b>05:00</b> Wake Up, Alpha GPC & Vit B</span><input type="checkbox"></div>
      <div class="check-row"><span><b>05:10</b> Scripture Study (20m)</span><input type="checkbox"></div>
      <div class="check-row" style="border:none"><span><b>05:30</b> Execute Cardio Session</span><input type="checkbox"></div>
    </div>
    
    <div class="card">
      <span class="tag">Cardio Prescr.</span>
      <div class="card-title" id="c-title">--</div>
      <div class="fuel-box" id="c-fuel">--</div>
      <div class="interval-box" id="c-intervals"></div>
      <div id="c-cue" style="font-size: 11px; font-weight: 700; color: #fff;"></div>
      <div id="c-note" class="coach-note"></div>
    </div>
    
    <div class="card" style="border-left-color: #fff; background: #111;">
      <span class="tag" style="color:#fff;">12:00 - 12:45 // Midday Armor</span>
      <div class="card-title" id="s-title">--</div>
      <div class="fuel-box" id="s-fuel" style="border-color: #fff; background: rgba(255,255,255,0.05);">--</div>
      <ul id="s-list" class="gym-list"></ul>
    </div>
  </div>

  <script>
    let selectedIdx = new Date().getDay() === 0 ? 6 : new Date().getDay() - 1;

    function calculateCardioFuelParams(durationMinutes) {
      let mixType = "";
      let ingredients = "";
      
      if (durationMinutes < 60) {
        mixType = "HYDRATION & ELECTROLYTES (0g Carbs)";
        ingredients = `<span style="color:#ccc;">• 1/2 tsp Pink Himalayan Salt (Coarse)</span>
                       <span style="color:#ccc;">• 1/8 tsp Nutricost Potassium Chloride</span>
                       <span style="color:#ccc;">• 1/8 tsp Nutricost Magnesium Malate</span>`;
      } else if (durationMinutes <= 90) {
        mixType = "STANDARD FUEL (30-45g Carbs/hr)";
        ingredients = `<span style="color:#ccc;">• 1/4 Cup Nutricost Maltodextrin</span>
                       <span style="color:#ccc;">• 1 Tbsp Bulk Supplements Fructose</span>
                       <span style="color:#ccc;">• 1/2 tsp Pink Himalayan Salt (Coarse)</span>
                       <span style="color:#ccc;">• 1/8 tsp Nutricost Potassium Chloride</span>
                       <span style="color:#ccc;">• 1/8 tsp Nutricost Magnesium Malate</span>
                       <span style="color:#ccc; font-style:italic;">*If before 1:00 PM, add caffeine.</span>`;
      } else {
        mixType = "ENDURANCE STACK (60-90g Carbs/hr)";
        ingredients = `<span style="color:#ccc;">• 1/3 Cup Nutricost Maltodextrin</span>
                       <span style="color:#ccc;">• 2 Tbsp Bulk Supplements Fructose</span>
                       <span style="color:#ccc;">• 1/2 tsp Pink Himalayan Salt (Coarse)</span>
                       <span style="color:#ccc;">• 1/8 tsp Nutricost Potassium Chloride</span>
                       <span style="color:#ccc;">• 1/8 tsp Nutricost Magnesium Malate</span>
                       <span style="color:#ccc; font-style:italic;">*If before 1:00 PM, add caffeine.</span>`;
      }

      return `<div style="width:100%; display:flex; flex-direction:column; gap:6px;">
                <span style="color:#fff; font-weight:bold; font-size:12px; border-bottom:1px solid #333; padding-bottom:4px; margin-bottom:2px;">${mixType}</span>
                ${ingredients}
              </div>`;
    }

    function calculateStrengthFuelParams() {
      return `<div style="width:100%; display:flex; flex-direction:column; gap:6px;">
                <span style="color:#fff; font-weight:bold; font-size:12px; border-bottom:1px solid #333; padding-bottom:4px; margin-bottom:2px;">MIDDAY ARMOR FUEL</span>
                <span style="color:#ccc;">• 1 tsp Nutricost Creatine Monohydrate</span>
                <span style="color:#ccc;">• 1/2 tsp Pink Himalayan Salt (Coarse)</span>
                <span style="color:#ccc;">• 1/8 tsp Nutricost Potassium Chloride</span>
                <span style="color:#ccc;">• 1/8 tsp Nutricost Magnesium Malate</span>
              </div>`;
    }

    function calculateRestFuelParams() {
      return `<div style="width:100%; display:flex; flex-direction:column; gap:6px;">
                <span style="color:#fff; font-weight:bold; font-size:12px; border-bottom:1px solid #333; padding-bottom:4px; margin-bottom:2px;">RECOVERY PROTOCOL</span>
                <span style="color:#ccc;">• Hydrate intuitively with pure water</span>
                <span style="color:#ccc;">• Prioritize whole food nutrition</span>
              </div>`;
    }

    function getPlan(wk) {
      const isDeload = (wk % 4 === 0);
      const volScale = isDeload ? 0.75 : 1.0;
      
      let phaseName = "BASE PHASE";
      let phaseType = "Time & Aerobic";
      let intensityLvl = "Low (80/20)";
      let deloadStatus = isDeload ? "ACTIVE DELOAD" : "BUILDING";

      if (wk >= 13 && wk <= 16) { phaseName = "BUILD PHASE"; phaseType = "Mileage & Threshold"; intensityLvl = "Moderate/High"; }
      if (wk >= 17 && wk <= 18) { phaseName = "PEAK PHASE"; phaseType = "Race Simulation"; intensityLvl = "High"; }
      if (wk >= 19) { phaseName = "TAPER PHASE"; phaseType = "Recovery"; intensityLvl = "Low"; deloadStatus = "TAPERING"; volScale = 0.5; }
      
      let schedule = [];

      if (wk < 13) {
        schedule = [
          { name: "MON", ct: "Swim: Aerobic Base", ci: [{l: "Time", v: `${Math.round(45*volScale)}m`}, {l: "Target", v: "Zone 2"}, {l: "Finisher", v: "4x25yd Sprints"}], cue: "Smooth Form", note: "Cardio: 45s rest at wall during sprints.", st: "Lower Body (Hypertrophy)", fuel: calculateCardioFuelParams(45), sFuel: calculateStrengthFuelParams(), sl: ["Back Squat: 3x10", "Romanian Deadlift: 3x10", "Leg Extensions: 3x12", "Hamstring Curls: 3x12", "Calf Raises: 4x15", "<span class='armor'>[Armor] Tibialis Raises: 3x20</span>"] },
          { name: "TUE", ct: "Run: Aerobic Base", ci: [{l: "Time", v: `${Math.round(55*volScale)}m`}, {l: "Target", v: "Zone 2"}, {l: "Finisher", v: "5x20s Strides"}], cue: "Conversational Pace", note: "Walk back to recover fully between strides.", st: "Upper Body (Hypertrophy)", fuel: calculateCardioFuelParams(55), sFuel: calculateStrengthFuelParams(), sl: ["Incline DB Bench: 3x10", "Lat Pulldown: 3x10", "Overhead Press: 3x10", "Chest Supported Row: 3x12", "Bicep Curls: 3x15", "Tricep Pushdowns: 3x15"] },
          { name: "WED", ct: "Bike: Aerobic Spin", ci: [{l: "Time", v: `${Math.round(60*volScale)}m`}, {l: "Target", v: "Zone 2"}, {l: "Finisher", v: "6x30s Spin-ups"}], cue: "Smooth Pedal Stroke", note: "Spin-ups in a heavy gear.", st: "Functional Tri-Mechanics", fuel: calculateCardioFuelParams(60), sFuel: calculateStrengthFuelParams(), sl: ["Kettlebell Swings: 4x15", "Pallof Press: 3x15/side", "Farmer's Carry: 3x60s", "Hanging Leg Raises: 3x15", "Copenhagen Plank: 3x45s/side"] },
          { name: "THU", ct: "Swim: Aerobic Base", ci: [{l: "Time", v: `${Math.round(45*volScale)}m`}, {l: "Target", v: "Zone 2"}, {l: "Finisher", v: "4x25yd Sprints"}], cue: "Consistent Breathing", note: "Focus on early vertical forearm.", st: "Lower Body (Hypertrophy)", fuel: calculateCardioFuelParams(45), sFuel: calculateStrengthFuelParams(), sl: ["Leg Press: 3x10", "Walking Lunges: 3x12/leg", "Glute Bridges: 3x15", "Seated Calf Raises: 3x15", "<span class='armor'>[Armor] Tibialis Raises: 3x20</span>"] },
          { name: "FRI", ct: "Run: Aerobic Base", ci: [{l: "Time", v: `${Math.round(50*volScale)}m`}, {l: "Target", v: "Zone 2"}, {l: "Finisher", v: "5x20s Strides"}], cue: "Quick Turnover", note: "Maintain strict Zone 2 cap before strides.", st: "Upper Body (Hypertrophy)", fuel: calculateCardioFuelParams(50), sFuel: calculateStrengthFuelParams(), sl: ["Weighted Pull-ups: 3x8", "Flat Bench Press: 3x10", "Seated Cable Row: 3x12", "Lateral Raises: 3x15", "Face Pulls: 3x15", "Hammer Curls: 3x12"] },
          { name: "SAT", ct: "Brick: Endurance + Run", ci: [{l: "Bike Time", v: `${Math.round(90*volScale)}m (Zone 2)`}, {l: "Bike Finisher", v: "6x30s Spin-ups"}, {l: "Run Time", v: `${Math.round(15*volScale)}m (Zone 2)`}], cue: "Aero & Nutrition", note: "Dial in bottle nutrition. Smooth transition to run.", st: "Weekend Rest", fuel: calculateCardioFuelParams(105), sFuel: calculateRestFuelParams(), sl: ["No Gym Session Today", "Prioritize recovery profile nutrition."] },
          { name: "SUN", ct: "Active Reset", ci: [{l: "Type", v: "Walk / Yoga"}, {l: "Time", v: "40m"}], cue: "Family Walk", note: "Zero intensity strides today.", st: "Full Mobility", fuel: calculateRestFuelParams(), sFuel: calculateRestFuelParams(), sl: ["Couch Stretch: 3m/leg", "Pigeon Pose: 3m/leg", "Thoracic Rotation: 20/side", "Foam Roll: 15m", "<span class='armor'>[Armor] Light Pogo Jumps: 3x20s</span>"] }
        ];
      } else {
        schedule = [
          { name: "MON", ct: "Swim: Endurance", ci: [{l: "Total", v: `${Math.round(2000*volScale)}yd`}, {l: "Main Set", v: "4x400yd @ Race Pace"}, {l: "Rest", v: "30s at wall"}], cue: "Pacing Discipline", note: "Warmup: 400yd easy. Cooldown: 200yd easy pull buoy.", st: "Lower Body (Hypertrophy)", fuel: calculateCardioFuelParams(60), sFuel: calculateStrengthFuelParams(), sl: ["Back Squat: 3x10", "Romanian Deadlift: 3x10", "Leg Extensions: 3x12", "Hamstring Curls: 3x12", "Calf Raises: 4x15", "<span class='armor'>[Armor] Tibialis Raises: 3x20</span>"] },
          { name: "TUE", ct: "Run: Threshold", ci: [{l: "Total", v: `${(6*volScale).toFixed(1)}mi`}, {l: "Main Set", v: "3x1mi @ Zone 4"}, {l: "Rest", v: "2m Walk"}], cue: "Embrace the Burn", note: "Warmup/Cooldown: 1.5mi Zone 2.", st: "Upper Body (Hypertrophy)", fuel: calculateCardioFuelParams(60), sFuel: calculateStrengthFuelParams(), sl: ["Incline DB Bench: 3x10", "Lat Pulldown: 3x10", "Overhead Press: 3x10", "Chest Supported Row: 3x12", "Bicep Curls: 3x15", "Tricep Pushdowns: 3x15"] },
          { name: "WED", ct: "Bike: Sweet Spot", ci: [{l: "Total", v: `${Math.round(25*volScale)}mi`}, {l: "Main Set", v: "2x20m @ 88-92% FTP"}, {l: "Rest", v: "5m Easy Spin"}], cue: "Sustained Power", note: "Warmup/Cooldown: 5mi easy spin.", st: "Functional Tri-Mechanics", fuel: calculateCardioFuelParams(75), sFuel: calculateStrengthFuelParams(), sl: ["Kettlebell Swings: 4x15", "Pallof Press: 3x15/side", "Farmer's Carry: 3x60s", "Hanging Leg Raises: 3x15", "Copenhagen Plank: 3x45s/side"] },
          { name: "THU", ct: "Swim: Threshold", ci: [{l: "Total", v: `${Math.round(1800*volScale)}yd`}, {l: "Main Set", v: "10x100yd (Sub-Race Pace)"}, {l: "Rest", v: "15s at wall"}], cue: "High Turnover", note: "Warmup: 300yd easy + 4x50 drills. Cooldown: 300yd easy.", st: "Lower Body (Hypertrophy)", fuel: calculateCardioFuelParams(50), sFuel: calculateStrengthFuelParams(), sl: ["Leg Press: 3x10", "Walking Lunges: 3x12/leg", "Glute Bridges: 3x15", "Seated Calf Raises: 3x15", "<span class='armor'>[Armor] Tibialis Raises: 3x20</span>"] },
          { name: "FRI", ct: "Run: Sustained Tempo", ci: [{l: "Total", v: `${(5*volScale).toFixed(1)}mi`}, {l: "Main Set", v: "3mi @ Race Pace (Continuous)"}], cue: "Biomechanical Efficiency", note: "Warmup/Cooldown: 1mi easy.", st: "Upper Body (Hypertrophy)", fuel: calculateCardioFuelParams(50), sFuel: calculateStrengthFuelParams(), sl: ["Weighted Pull-ups: 3x8", "Flat Bench Press: 3x10", "Seated Cable Row: 3x12", "Lateral Raises: 3x15", "Face Pulls: 3x15", "Hammer Curls: 3x12"] },
          { name: "SAT", ct: "Brick: Race Sim", ci: [{l: "Bike", v: `${Math.round(40*volScale)}mi @ Target Watts`}, {l: "Run", v: `${(4*volScale).toFixed(1)}mi (Settle into Pace)`}], cue: "Execution & Transition", note: "Mile 1 of run fast (adrenaline sim), then lock into target pace.", st: "Weekend Rest", fuel: calculateCardioFuelParams(180), sFuel: calculateRestFuelParams(), sl: ["No Gym Session Today", "Prioritize maximum recovery."] },
          { name: "SUN", ct: "Active Reset", ci: [{l: "Type", v: "Walk / Yoga"}, {l: "Time", v: "40m"}], cue: "System Flush", note: "Zero intensity. Flush the legs.", st: "Full Mobility", fuel: calculateRestFuelParams(), sFuel: calculateRestFuelParams(), sl: ["Couch Stretch: 3m/leg", "Pigeon Pose: 3m/leg", "Thoracic Rotation: 20/side", "Foam Roll: 15m", "<span class='armor'>[Armor] Light Pogo Jumps: 3x20s</span>"] }
        ];
      }

      return { 
        phase: phaseName + (isDeload ? " (DELOAD)" : ""),
        totals: { t1: phaseType, t2: intensityLvl, t3: deloadStatus },
        days: schedule 
      };
    }

    function updateView(idx) {
      selectedIdx = idx;
      const wk = parseInt(document.getElementById("wk-sel")?.value || 11);
      const plan = getPlan(wk);
      const day = plan.days[idx];
      
      document.getElementById("phase-tag").innerText = plan.phase;
      document.getElementById("w-swim").innerText = plan.totals.t1;
      document.getElementById("w-bike").innerText = plan.totals.t2;
      document.getElementById("w-run").innerText = plan.totals.t3;

      document.getElementById("c-title").innerText = day.ct;
      document.getElementById("c-cue").innerText = `Cue: ${day.cue}`;
      document.getElementById("c-note").innerText = `Coach: ${day.note}`;
      document.getElementById("c-fuel").innerHTML = day.fuel;
      document.getElementById("c-intervals").innerHTML = day.ci.map(i => `<div class="interval-row"><span>${i.l}</span><b>${i.v}</b></div>`).join('');
      
      document.getElementById("s-title").innerText = day.st;
      document.getElementById("s-fuel").innerHTML = day.sFuel;
      document.getElementById("s-list").innerHTML = day.sl.map(s => `<li>${s}</li>`).join('');
      
      initScroll(wk);
    }

    function initScroll(wk) {
      document.getElementById("weekly-overview").innerHTML = getPlan(wk).days.map((d, i) => `<div class="weekly-day-card ${i===selectedIdx?'active':''}" onclick="updateView(${i})"><span class="wd-name">${d.name}</span><span class="wd-work">${d.ct.split(':')[0]}</span></div>`).join('');
    }

    function init() {
      const race = new Date("September 13, 2026").getTime();
      const todayDate = new Date("June 10, 2026").getTime();
      document.getElementById("countdown").innerText = Math.max(0, Math.floor((race - todayDate) / (1000*60*60*24))) + " DAYS TO RACE";
      
      const startDate = new Date("March 30, 2026").getTime();
      let calculatedWeek = 1;
      
      if (todayDate > startDate) {
        const daysPassed = Math.floor((todayDate - startDate) / (1000*60*60*24));
        calculatedWeek = Math.floor(daysPassed / 7) + 1;
      }
      calculatedWeek = Math.min(Math.max(calculatedWeek, 1), 20);

      const sel = document.createElement('select'); 
      sel.id = "wk-sel"; 
      sel.onchange = () => updateView(selectedIdx);
      sel.className = "calc-input"; 
      
      for(let i=1; i<=20; i++) { 
        let o = document.createElement('option'); 
        o.value = i; 
        o.text = `WEEK ${i} ${i%4===0 ? '(DELOAD)' : ''}`; 
        if(i === calculatedWeek) { o.selected = true; } 
        sel.appendChild(o); 
      }
      
      document.querySelector('header').appendChild(sel);
      updateView(selectedIdx); 
    }
    
    init();
  </script>
</body>
</html>
